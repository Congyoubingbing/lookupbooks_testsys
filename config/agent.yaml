models:
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  vision_model: qwen3-vl-plus
  llm_model: qwen3.5-397b-a17b
  vision_enable_thinking: false
  request_timeout_s: 600
  max_retries: 3
  backoff_s:
  - 2
  - 4
  - 8
  key_env_prefix: QWEN_API_KEY_
  key_env_count: 24
qa_models:
  polish_model: ''
  direct_answer_model: qwen3.5-397b-a17b
  judge_model: qwen3.5-397b-a17b
  rank_books_stage1_model: qwen3.5-397b-a17b
  rank_books_stage2_model: qwen3.5-397b-a17b
  rank_chapters_stage3_model: qwen3.5-397b-a17b
  rank_chapters_stage4_model: qwen3.5-397b-a17b
  rank_sections_stage5_model: qwen3.5-397b-a17b
  final_answer_model: qwen3.5-397b-a17b
  compare_model: qwen3.5-397b-a17b
  format_model: qwen3.5-397b-a17b
  self_assess_model: qwen3.5-397b-a17b
qa:
  step1_book_candidates_min: 3
  step1_book_candidates_max: 7
  step2_books_to_view_min: 1
  step2_books_to_view_max: 2
  step3_chapters_per_book_min: 1
  step3_chapters_per_book_max: 5
  step4_chapters_to_view_min: 1
  step4_chapters_to_view_max: 2
  step5_sections_per_chapter_max: 6
  step5_sections_total_max: 10
  allow_masked_sections: false
  prefer_exposure:
  - expose
  - caution
  min_section_quality_score: 0.0
  section_text_max_chars: 80000
  sections_total_max_chars: 240000
  direct_answer_max_tokens: null
  judge_max_tokens: 64
  rank_max_tokens: 1024
  final_answer_max_tokens: null
  answer_compare_max_tokens: 256
  post_format_max_tokens: null
  answer_format_validation_enabled: true
  answer_format_max_repairs: 1
  answer_format_max_reanswers: 1
  answer_format_repair_max_tokens: null
  test_mode: M3
  force_retrieval: false
  no_retrieval: false
  enable_judge: true
  post_format_enabled: true
  baseline_disable_post_format: true
  use_expert_prompt: false
  expert_prompt_path: prompts/expert_polymer_simulation.md
  confidence_threshold: 0.7
  self_assess_max_tokens: 256
  use_chapter_summary: false
  skip_extraction: false
  raw_chapter_truncate_strategy: head_with_formula_enrichment
  raw_chapter_max_chars: 60000
  force_retrieval_enable_repair: true
  force_retrieval_min_rounds: 1
  force_retrieval_min_evidence_chars: 800
  force_retrieval_max_repairs: 2
  force_retrieval_expand_topk_pairs_to: 10
  force_retrieval_fallback_to_raw_chapter: true
  step2_max_repairs: 2
  retrieval_contract_retry_enabled: true
  retrieval_contract_max_reasks: 2
  retrieval_contract_require_verbatim_ids: true
  retrieval_contract_example_enabled: true
  retrieval_contract_fail_on_oos_ids: true
  retrieval_contract_fail_on_count_mismatch: true
  report_structured_enabled: true
  report_use_deterministic_sources: true
  report_retrieval_max_items: 8
  report_retrieval_excerpt_max_chars: 2500
eval:
  judge_model: qwen3.5-397b-a17b
  judge_temperature: 0.0
  judge_max_tokens: 900
  judge_workers: 24
  rubric_path: prompts/judge/rubric_proxy_v1.md
  final_answer_max_chars: 6000
  outline_max_chars: 8000
  audit_outline_max_chars: 12000
  evidence_max_chars_per_chunk: 8000
  evidence_max_chars_total: 24000
