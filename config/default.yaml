models:
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  vision_model: qwen3-vl-plus
  llm_model: qwen3.5-397b-a17b
  vision_enable_thinking: false
  request_timeout_s: 180
  max_retries: 3
  backoff_s:
  - 2
  - 4
  - 8
  key_env_prefix: QWEN_API_KEY_
  key_env_count: 10
runtime:
  out_dir: ./outputs
  max_book_dir_len: 120
  max_windows_path_len: 245
  chapter_filename_max_len: 80
  cache_dirname: _cache
  logs_dirname: _logs
  keep_intermediate: false
  persist_cache_artifacts: true
pdf:
  dpi_low: 120
  dpi_high: 240
  unit_image_dpi_low: 160
  unit_image_dpi_high: 320
  double_page_aspect_ratio_threshold: 1.2
  force_layout: null
  force_gutter_x: null
  double_page_gutter_detect: false
  double_page_gutter_white_frac_min: 0.85
  double_page_gutter_score_min: 0.25
  toc_scan_max_units_pass1: 260
  toc_stride_pass1: 1
  toc_stride_pass2: 8
  toc_score_threshold: 0.75
  toc_expand_backward_units: 6
  toc_expand_forward_units: 24
  toc_rescan_expand_units: 18
  enable_page_label_reading: true
  page_label_min_conf: 0.65
  page_label_text_regions:
  - top
  - bottom
  page_label_crop_policies:
  - top_outer
  - top_left
  - top_right
  - top_center
  - bottom_outer
  - bottom_center
  - bottom_right
  - bottom_left
  page_label_crop_y0_ratio: 0.82
  page_label_crop_top_y1_ratio: 0.22
  page_label_reject_toc_score: 0.65
  page_label_coverage_target: 0.8
  enable_page_label_regression: true
  page_label_sample_scan_units: 260
  page_label_sample_stride: 4
  page_label_samples_target: 12
  page_label_max_vl_calls: 24
  page_label_fit_min_points: 4
  page_label_fit_max_abs_err: 3.0
  page_label_min_conf_use: 0.35
  infer_page1_min_conf: 0.8
  infer_page1_high_pages_threshold: 30
  infer_page1_untrusted_conf_cap: 0.7
  infer_page1_max_unit: 200
  infer_page1_verify_window_units: 2
  page1_scan_first_units: 120
  page1_scan_stride: 1
  page1_reject_toc_score: 0.8
  page1_backcalc_max_printed_page: 50
  page1_backcalc_min_points: 2
  page1_backcalc_offset_tol_units: 3
  page1_trust_early_max_unit: 160
  page1_sequence_verify_ahead: 6
  page1_sequence_verify_required: 1
  page_label_min_spearman: 0.75
  page_label_max_printed_page_abs: 1200
  page_label_max_printed_page_buffer: 100
  chapter_start_search_window_units: 18
  chapter_start_min_score: 0.75
  chapter_start_reject_toc_score: 0.72
  enable_monotone_repair: true
  min_chapter_unit_gap: 2
  monotone_repair_lookahead_units: 40
toc:
  parse_depth: chapter_only
  min_required_chapters: 6
  min_required_chapters_hard: 4
  smallbook_max_units: 220
  smallbook_min_required_chapters: 5
  max_chapters: 150
  max_attempts: 3
  filter_markdown_lines: true
  min_valid_lines: 18
  min_trailing_digit_lines: 5
  min_trailing_digit_ratio: 0.1
  numeric_only_ratio_max: 0.65
  alpha_ratio_min: 0.14
  alpha_lines_min: 6
  text_max_units: 12
  vl_max_units: 8
  template_title_ratio_max: 0.6
  title_unique_ratio_min: 0.6
  numeric_title_ratio_max: 0.55
  max_nonmonotonic_pages: 0
  allow_section_fallback: false
  enforce_chapter_level_reduction: true
  require_global_toc: true
  global_min_distinct_prefixes: 3
  global_min_max_page: 50
  require_starts_near_one: true
  start_near_one_max: 2
  min_printed_page_nonempty_ratio: 0.6
  min_printed_page_span: 30
  scan_confirm_global: true
  scan_confirm_max_vl_pages: 2
  min_markdown_len: 220
  min_lines: 18
  min_alpha_lines: 6
  min_tail_digit_lines: 6
  anchor_topk: 3
  anchor_min_score: 0.2
  anchor_window_backward_units: 10
  anchor_window_forward_units: 4
anchors:
  anchors_per_chapter: 3
  search_forward_only: true
  allow_backward_fallback: true
  min_title_token_overlap: 0.15
  opening_snippet_words: 140
  unit_search_radius: 2
  reject_toc_score: 0.7
  symbol_ratio_max: 0.55
  anchor_max_len_chars: 180
text:
  chunk_size_chars: 4000
  chunk_overlap_chars: 400
  normalize:
    lowercase: true
    normalize_nfkc: true
    remove_soft_hyphen: true
    collapse_whitespace: true
    remove_hyphen_linebreak: true
    normalize_quotes: true
align:
  seed_bin_width_chars: 200
  topk_candidates: 30
  candidate_window_chars: 4000
  fallback_window_chars: 240000
  candidate_stride_chars: 600
  candidate_min_alnum_ratio: 0.06
  candidate_max_brace_ratio: 0.22
  llm_fallback_retries: 2
  llm_fallback_expand_factor: 1.9
  llm_use_raw_excerpt_for_tex: true
  structural_heading_fallback_enable: true
  backward_anchor_scan_chars: 12000
  backward_anchor_tail_min_score: 60
  backward_anchor_shift_chars: 1200
  backward_anchor_heading_snap_limit: 40000
  min_accept_confidence: 0.68
  max_retry_per_chapter: 3
  nonmonotone_forward_max_chunks: 60
  safe_cut_window_chars: 2000
  safe_cut_midline_penalty: 250
  safe_cut_strong_chapter_bonus: 800
  safe_cut_avoid_midword: true
  safe_cut_midword_penalty: 0.35
  safe_cut_avoid_tex_command_split: true
  safe_cut_tex_command_penalty: 0.8
  safe_cut_after_post_lock: true
  safe_cut_generic_heading_bonus: 30
  safe_cut_tex_nonchapter_heading_bonus: 10
  safe_cut_tex_decimal_heading_penalty: 140
  lead_max_offset: 600
  lead_scan_chars: 20000
  lead_offset_strategy: shift
  lead_shift_protect_tex_heading: true
  lead_shift_heading_protect_window_chars: 120000
  opening_align_min_score: 55.0
  post_min_gap_chars: 800
  catastrophic_gap_chars: 5
  min_segment_chars: 1500
  min_chapter_chars: 1500
  post_repair_small_gap_ratio: 0.15
  post_repair_small_gap_min_count: 3
  post_repair_unreliable_conf: 0.78
  hard_low_local_snippet_score: 0.14
  tex_fallback_max_chapters: 80
  tex_fallback_min_event_spacing_chars: 2000
  unit_backfill_search_stride: 3
  unit_backfill_min_score: 0.74
  unit_backfill_early_stop: 0.92
  unit_backfill_tail_step_units: 8
  prefer_tex_headings: true
  tex_heading_pref_min_conf: 0.05
  tex_numbered_heading_conf_floor: 0.78
  tex_parse_allow_starred_headings: true
  tex_chapter_detect_enable_allcaps_section_star: true
  tex_chapter_detect_allow_cn_chapter_spaces: true
  tex_section_like_integer_dot_demote: true
  tex_heading_min_chapters: 3
  tex_heading_dedup_gap_chars: 5000
  title_match_min_ratio: 0.72
  tex_toc_title_promotion_enable: true
  tex_toc_title_promotion_min_sim: 0.72
  tex_heading_lock_enable: true
  tex_heading_lock_window_chars: 20000
  tex_heading_lock_force_after_heading_chars: 120000
  tex_heading_lock_force_before_heading_chars: 40000
  tex_heading_lock_min_title_sim: 0.45
  tex_heading_lock_dual_boundary_enable: true
  tex_heading_lock_reclaim_next_heading: true
  tex_heading_lock_min_gap_chars: 32
  tex_heading_lock_min_prev_seg_chars: 64
  tex_heading_lock_min_cluster_sep_chars: 8
  tex_heading_lock_reclaim_min_lead_chars: 80
  tex_heading_lock_reclaim_min_title_sim: 0.6
  backmatter_trim_enable: true
  backmatter_trim_keywords:
  - \section*{REFERENCES}
  - \section*{References}
  - \section*{SUBJECT INDEX}
  - \section*{AUTHOR INDEX}
  - \section*{参考文献}
  - \section*{索引}
  pdf_text_probe_enable: true
  pdf_text_probe_radius_units: 4
  pdf_text_probe_min_sim: 0.75
  vl_boundary_relocate_enable: true
  vl_boundary_relocate_mode: always
  vl_boundary_verify_after_lock: true
  vl_boundary_relocate_retry_on_weak: true
  vl_boundary_relocate_max_retries: 2
  vl_boundary_verify_min_score: 0.78
  vl_boundary_relocate_radius_units: 4
  vl_boundary_relocate_step_units: 1
  vl_boundary_relocate_max_checks: 11
  vl_boundary_relocate_min_score: 0.6
  vl_boundary_relocate_min_margin: 0.03
  vl_boundary_relocate_prefer_true_start: true
  vl_boundary_relocate_use_full_region: true
  llm_pick_max_tokens: 900
verify:
  enable: true
  skip_if_missing_units_ratio: 0.5
  samples_per_chapter: 2
  verify_min_hit_ratio: 0.6
  needs_review_hit_ratio: 0.35
  local_repair_radius_chars: 20000
  search_window_chars: 120000
  fuzzy_threshold: 0.7
  token_jaccard_threshold: 0.42
  min_hits: 2
  start_boundary_check_enable: true
  start_boundary_head_chars: 20000
  start_boundary_prev_tail_chars: 20000
  start_boundary_prev_vs_head_margin: 0.08
  start_boundary_min_opening_chars: 24
  start_boundary_prev_bad_score: 0.8
  start_boundary_fail_on_prev_leak: true
  start_boundary_heading_lead_warn_chars: 2000
output:
  mode: split
  marker_tpl: '


    ==== [PDF_CHAPTER {no}] {title} ====


    '
  filename_tpl: Chapter_{no:02d}_{title}.txt
  sanitize_filenames: true
  max_title_len: 80
  filename_hash_suffix: true
llm:
  vl_boundary_verify_max_tokens: 300
  vl_boundary_relocate_max_tokens: 400
  micro_fragment_max_chars: 6
